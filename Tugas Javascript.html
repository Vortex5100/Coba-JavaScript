<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas 4 JavaScript</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            margin:40px;
        }
        .header{
            border-bottom:1px solid #000;
            margin-bottom:20px;
        }
        img{
            width:80px;
        }
        .section{
            margin-top:15px;
        }
        button{
            margin-top:10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>Nama : Igantius Farrel Aditya Pratama</h2>
        <h3>NIM : 245314037</h3>
        <img src="Ignatius Farrel Aditya Pratama.jpg" alt="Foto Farrel" width="200">
    </div>
    <div class="section">
        Nama : 
        <input type="text" id="nama">
        <br><br>

        Jumlah Pilihan : 
        <input type="number" id="jumlah" min="1">
        <br>

        <button onclick="buaInputPilihan()">OK</button></button>
    </div>
    <div id="pilihanInput"></div>
    <div id="radioArea"></div>
    <div id="emailArea"></div>
    <div id="output"></div>

    <script>
        let pilihhanArray = []
        let pilihanDipilih = ""

        function buatInputPilihan(){
            let jumlah = document.getElementById("jumlah").value
            let area = document.getElementById("pilihanInput")

            if(jumlah <= 0){
                alert("Jumlah pilihan harus lebih dari 0")
                return
            }
            area.innerHTML = ""
            for(let i=1; i<=jumlah; i++){
                area.innerHTML +=
                `<div>Pilihan ${i} : <input type="text" id="pilihan${i}"></div><br><br>`
            }
            area.innerHTML += `<button onclick="simpanPilihan()">OK</button>`
        }

        function simpanPilihan(){
            let jumlah = document.getElementById("jumlah").value
            pilihhanArray = []
            for(let i=1; i<=jumlah; i++){
                let text = document.getElementById("pilihan"+i).value
                if(text == ""){
                    alert("Pilihan tidak boleh kosong")
                    return
                }
                pilihhanArray.push(text)
            }
            tampilRadio()
        }

        function tampilRadio(){
            let area = document.getElementById("radioArea")
            area.innerHTML = "<h3>Pilihan : </h3>"
            for(let pilihan of pilihhanArray){
                area.innerHTML += `<input type="radio" name="pilihan" value="${pilihanArray[i]}"> ${pilihanArray[i]}<br>`
            }
            area.innerHTML += `<br><button onclick="pilihRadio()">OK</button>`
        }

        function pilihRadio(){
            let radio = documentsByName("pilihan")
            for(let r of radio){
                if(r.checked){
                    pilihanDipilih = r.value
                }
            }
            if(pilihanDipilih == ""){
                alert("Pilih salah satu pilihan")
                return
            }
            tampilEmail()
        }
    </script>
</body>
</html>
